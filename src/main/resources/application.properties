spring.application.name=shop-demo

# 1. DB 연결 주소 (localhost의 3307 포트, rdb_study 데이터베이스)
# 다시 3306으로 변경 (Docker -> Mysql)
# spring.datasource.url=jdbc:mysql://localhost:3307/rdb_study?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.url=jdbc:mysql://localhost:3306/shop_demo?serverTimezone=Asia/Seoul&characterEncoding=UTF-8

# 2. DB 접속 계정 및 비밀번호
# (환경변수 방식)
# spring.datasource.username={DB_USERNAME}
# spring.datasource.password={DB_PASSWORD}
spring.datasource.username=root
spring.datasource.password=test1234

# 3. MySQL 드라이버 설정
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 4. JPA 설정
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 5. redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.session.store-type=redis

#sql log 출력
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG